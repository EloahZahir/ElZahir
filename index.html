<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>eL Zahir | The Rare Culture Archive</title>
<meta name="description" content="Rare collectibles, analog artifacts, cinema, and cultural memory.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--bg:#050403;
--gold:#d4af5a;
--text:#f2e8cf;
--muted:#9c8c6a;
}

body{
background:var(--bg);
color:var(--text);
font-family:Inter,sans-serif;
overflow-x:hidden;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
padding:1rem 5%;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:1000;
}
.logo{
font-family:"Cormorant Garamond",serif;
font-size:1.6rem;
color:var(--gold);
}
nav a{
color:var(--text);
text-decoration:none;
margin-left:1.5rem;
font-size:.8rem;
letter-spacing:.2em;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}
.hero-bg{
position:absolute;
inset:0;
background:url("https://images.unsplash.com/photo-1524492412937-b28074a5d7da?w=1800&q=90") center/cover;
filter:brightness(.4);
}
.hero h1{
font-family:"Cormorant Garamond",serif;
font-size:clamp(3rem,8vw,6rem);
color:var(--gold);
position:relative;
z-index:2;
}
.hero p{
position:relative;
z-index:2;
letter-spacing:.3em;
font-size:.7rem;
}

/* GRID */
.section{
padding:5rem 5%;
max-width:1300px;
margin:auto;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:2rem;
}
.card{
background:#111;
border-radius:20px;
overflow:hidden;
transition:.4s;
cursor:pointer;
}
.card img{
width:100%;
height:220px;
object-fit:cover;
}
.card:hover{
transform:translateY(-10px);
}
.card-content{
padding:1rem;
}
.card h3{
font-family:"Cormorant Garamond",serif;
color:var(--gold);
}

/* FOOTER */
footer{
text-align:center;
padding:3rem;
color:var(--muted);
}

/* MODAL */
#modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
visibility:hidden;
transition:.3s;
}
.modal-box{
background:#111;
border-radius:20px;
overflow:hidden;
max-width:500px;
width:90%;
}
.modal-box img{
width:100%;
height:250px;
object-fit:cover;
}
.modal-box div{
padding:1.5rem;
}
button{
background:var(--gold);
border:none;
padding:.6rem 1.5rem;
border-radius:30px;
cursor:pointer;
margin-top:1rem;
}
</style>
</head>

<body>

<nav>
<div class="logo">eL Zahir</div>
<div>
<a href="#collect">Archive</a>
<a href="#media">Media</a>
<a href="#contact">Contact</a>
</div>
</nav>

<section class="hero">
<div class="hero-bg" id="bg"></div>
<div>
<h1>eL Zahir</h1>
<p>RARE CULTURE ARCHIVE</p>
</div>
</section>

<section class="section" id="collect">
<h2 style="margin-bottom:2rem;">Collection</h2>

<div class="grid">

<div class="card" data-title="Vintage Star Wars" data-desc="Original figures and sealed collectibles." data-img="https://images.unsplash.com/photo-1608889476561-6242cfdbf622?w=800&q=85">
<img src="https://images.unsplash.com/photo-1608889476561-6242cfdbf622?w=800&q=85">
<div class="card-content"><h3>Star Wars</h3></div>
</div>

<div class="card" data-title="Board Games" data-desc="Classic tabletop relics." data-img="https://images.unsplash.com/photo-1501139083538-0139583c060f?w=700&q=80">
<img src="https://images.unsplash.com/photo-1501139083538-0139583c060f?w=700&q=80">
<div class="card-content"><h3>Board Games</h3></div>
</div>

<div class="card" data-title="LEGO Classics" data-desc="Vintage LEGO sets." data-img="https://images.unsplash.com/photo-1587654780291-39c9404d746b?w=700&q=80">
<img src="https://images.unsplash.com/photo-1587654780291-39c9404d746b?w=700&q=80">
<div class="card-content"><h3>LEGO</h3></div>
</div>

</div>
</section>

<footer>
© 2026 eL Zahir
</footer>

<!-- MODAL -->
<div id="modal">
<div class="modal-box">
<img id="mImg">
<div>
<h2 id="mTitle"></h2>
<p id="mDesc"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

/* PARALLAX */
const bg=document.getElementById("bg");
document.addEventListener("mousemove",(e)=>{
let x=(e.clientX/window.innerWidth-.5)*10;
let y=(e.clientY/window.innerHeight-.5)*6;
bg.style.transform=`scale(1.05) translate(${x}px,${y}px)`;
});

/* ANIMATION */
gsap.from("h1",{y:80,opacity:0,duration:1});

/* MODAL */
const modal=document.getElementById("modal");
const mImg=document.getElementById("mImg");
const mTitle=document.getElementById("mTitle");
const mDesc=document.getElementById("mDesc");

document.querySelectorAll(".card").forEach(card=>{
card.onclick=()=>{
mImg.src=card.dataset.img;
mTitle.innerText=card.dataset.title;
mDesc.innerText=card.dataset.desc;
modal.style.opacity=1;
modal.style.visibility="visible";
};
});

function closeModal(){
modal.style.opacity=0;
modal.style.visibility="hidden";
}
</script>

</body>
</html>
