<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>eL Zahir | Rare Art · Collectibles · Culture</title>

<meta name="description" content="eL Zahir is a curated digital archive of rare collectibles, vintage culture, and artistic artifacts spanning film, music, comics, literature, and design. A nostalgic, immersive experience blending 70s Middle Eastern aesthetics with modern web performance." />

<link rel="canonical" href="https://elzahir.pages.dev" />

<!-- OPEN GRAPH (FIXED) -->
<meta property="og:title" content="eL Zahir | Rare Culture Archive" />
<meta property="og:description" content="Step into a 70s-inspired Middle Eastern world of rare collectibles, art, and nostalgia." />
<meta property="og:image" content="https://elzahir.pages.dev/og/current.jpg?v=2" />
<meta property="og:url" content="https://elzahir.pages.dev/" />
<meta property="og:site_name" content="eL Zahir Archive" />
<meta property="og:type" content="website" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />

<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="https://elzahir.pages.dev/og/current.jpg?v=2" />

<!-- FAVICON -->
<link rel="icon" href="/og/favicon.png" />
<link rel="apple-touch-icon" href="/og/favicon.png" />
<meta name="theme-color" content="#130f0a">

<!-- PERFORMANCE -->
<link rel="preload" as="image" href="https://images.unsplash.com/photo-1608889476561-6242cfdbf622?w=800&q=80">

<!-- FONTS -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;600&family=Spectral:wght@300;400&display=swap" rel="stylesheet">

<style>
/* KEEPING YOUR FULL DESIGN — TRIMMED COMMENT HEADER */
:root{
  --sand:#e8d5a8;
  --deep:#0d0b08;
  --gold:#c8a85e;
  --text:#f0e6ca;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--deep);
  color:var(--text);
  font-family:'Spectral',serif;
}

/* NAV */
nav{
  position:fixed;width:100%;
  display:flex;justify-content:space-between;
  padding:20px 5%;
  background:rgba(0,0,0,.8);
  z-index:1000;
}
nav a{color:var(--gold);text-decoration:none;margin:0 10px}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}
.hero-bg{
  position:absolute;inset:0;
  background:url('https://images.unsplash.com/photo-1524492412937-b28074a5d7da?w=1800&q=85') center/cover;
  opacity:.4;
}
.hero h1{
  font-family:'Playfair Display';
  font-size:4rem;
  color:var(--sand);
}

/* FEATURE TEXT */
.featured-banner{
  text-align:center;
  padding:40px;
  color:var(--gold);
  letter-spacing:.3em;
  text-transform:uppercase;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  padding:80px 5%;
}
.card{
  background:#1a1510;
  border:1px solid rgba(200,168,94,.2);
  overflow:hidden;
}
.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}
.card h3{
  padding:15px;
  font-family:'Playfair Display';
}

/* FOOTER */
footer{
  text-align:center;
  padding:60px;
  border-top:1px solid rgba(200,168,94,.2);
}
</style>
</head>

<body>

<nav>
  <div>eL Zahir</div>
  <div>
    <a href="#">Collectibles</a>
    <a href="#">Art</a>
    <a href="#">Media</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-bg"></div>
  <h1>eL Zahir</h1>
</section>

<div class="featured-banner">
  Featured Archive Experience · Curated Objects · Timeless Culture
</div>

<section class="grid">

  <div class="card">
    <img src="/images/starwars.jpg" onerror="this.src='https://images.unsplash.com/photo-1608889476561-6242cfdbf622?w=800&q=80'">
    <h3>Vintage Star Wars</h3>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1501139083538-0139583c060f?w=700&q=80">
    <h3>Board Games</h3>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1587654780291-39c9404d746b?w=700&q=80">
    <h3>LEGO Classics</h3>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?w=600&q=80">
    <h3>Comic Books</h3>
  </div>

</section>

<footer>
  © 2026 eL Zahir — Archive of Rare Culture
</footer>

<script>
/* PARALLAX */
document.addEventListener('mousemove', e => {
  const x = (e.clientX / window.innerWidth - 0.5) * 10;
  const y = (e.clientY / window.innerHeight - 0.5) * 10;
  document.querySelector('.hero-bg').style.transform =
    `scale(1.05) translate(${x}px, ${y}px)`;
});
</script>

</body>
</html>
